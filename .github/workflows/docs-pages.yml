name: Deploy Docs (GitHub Pages)

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN == '' }}
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Configure Pages (auto-enable)
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          enablement: true
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static docs
        run: npm run build

      - name: Prepare Pages artifact
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Verify Pages is enabled
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN == '' }}
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request("GET /repos/{owner}/{repo}/pages", {
                owner: context.repo.owner,
                repo: context.repo.repo
              });
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(
                  "GitHub Pages is not enabled for this repository. Enable Settings > Pages > Build and deployment > Source = GitHub Actions, or add a PAGES_ENABLEMENT_TOKEN secret with repo admin access so this workflow can auto-enable Pages."
                );
                return;
              }

              throw error;
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
