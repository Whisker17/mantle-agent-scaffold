name: Codex Code Review

on:
  # Runs AFTER Claude Code Review completes, so Codex can cross-review Claude's comments
  workflow_run:
    workflows: ["Claude Code Review"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  review:
    name: Codex Review PR
    # Only run for PR events, skip if no PR is associated
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - name: Get PR context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }} --jq '.pull_requests[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this workflow run, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Found PR #$PR_NUMBER"

      - uses: actions/checkout@v4
        if: steps.pr.outputs.skip != 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup Node
        if: steps.pr.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Codex CLI
        if: steps.pr.outputs.skip != 'true'
        run: npm install -g @openai/codex

      - name: Configure Codex gateway
        if: steps.pr.outputs.skip != 'true'
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml << 'TOML_EOF'
          model = "gpt-5.5"
          model_provider = "gateway"

          [model_providers.gateway]
          name = "LLM Gateway"
          base_url = "https://${{ vars.CODEX_GATEWAY_HOSTNAME }}"
          env_key = "CODEX_API_KEY"
          wire_api = "chat"
          TOML_EOF

      - name: Run Codex Review
        if: steps.pr.outputs.skip != 'true'
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          REPO="${{ github.repository }}"

          cat > /tmp/codex-review-prompt.txt << 'PROMPT_EOF'
          You are reviewing Pull Request #__PR_NUMBER__ in the repository __REPO__.

          This is a TypeScript monorepo (mantle-agent-scaffold) for Mantle L2 tooling — core library, CLI, and MCP server.

          CODEBASE:
          - Monorepo with npm workspaces: packages/core, packages/cli, packages/mcp
          - Language: TypeScript (ES modules, "type": "module")
          - Runtime: Node.js >= 20
          - Build: tsc with project references (tsconfig.base.json)
          - Test: vitest (unit + e2e)
          - Dependencies: @ai-sdk/anthropic, @ai-sdk/openai, ai (Vercel AI SDK)

          STEP 1 — UNDERSTAND THE PR:
          Run these commands to get full context:
            gh pr view __PR_NUMBER__ --json title,body,labels,files
            gh pr diff __PR_NUMBER__

          STEP 2 — READ CLAUDE'S REVIEW:
          Another AI reviewer (Claude) has already reviewed this PR. Fetch Claude's inline comments:
            gh api repos/__REPO__/pulls/__PR_NUMBER__/comments --jq '.[] | select(.user.login == "github-actions[bot]") | {id, path, line, body}'
          Also fetch Claude's summary comment:
            gh api repos/__REPO__/issues/__PR_NUMBER__/comments --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("CLAUDE_REVIEW_SUMMARY"))) | {id, body}'

          STEP 3 — YOUR OWN REVIEW:
          Review the PR diff independently. Focus on:

          Implementation Logic (HIGH PRIORITY):
          - Correctness: does the code do what the PR says? Logical bugs, off-by-one errors, missed cases?
          - Completeness: are there scenarios the code doesn't handle? Missing validations?
          - Edge cases: empty input, null values, network failures, concurrent requests, unexpected data shapes?
          - Behavioral regressions: could this break existing functionality?
          - Data flow: is data transformed correctly? Are intermediate states consistent?

          Code Quality:
          - Type safety: `any` usage, missing return types, unchecked assertions, null/undefined checks
          - Error handling: unhandled rejections, missing try/catch, swallowed errors
          - Async patterns: fire-and-forget promises, missing `await`, race conditions
          - Security: unsanitized input, secrets in code, path traversal
          - Module design: circular dependencies, incorrect exports

          STEP 4 — CROSS-REVIEW CLAUDE'S COMMENTS:
          For each of Claude's inline comments:
          1. Read the comment and understand what issue Claude raised
          2. Look at the same code location and form your own opinion
          3. If you AGREE with Claude — do NOT post a duplicate. Skip it.
          4. If you DISAGREE with Claude or have a DIFFERENT perspective — post your own inline comment at the same location explaining your view. Start with "🟢 **Codex:** Regarding Claude's comment above:" and explain why you see it differently.
          5. If you find NEW issues that Claude missed — post inline comments for those too.

          STEP 5 — POST YOUR FINDINGS:
          For new issues (not covered by Claude):
            gh api repos/__REPO__/pulls/__PR_NUMBER__/comments \
              -f body="🟢 **Codex:** <your comment>" \
              -f path="<file_path>" \
              -f commit_id="$(gh pr view __PR_NUMBER__ --json headRefOid --jq '.headRefOid')" \
              -f side="RIGHT" \
              -F line=<line_number>

          STEP 6 — POST SUMMARY:
          After reviewing, clean up your previous summary comments:
            1. Run: gh api repos/__REPO__/issues/__PR_NUMBER__/comments --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("CODEX_REVIEW_SUMMARY"))) | .id' | while read id; do gh api repos/__REPO__/issues/comments/$id -X DELETE; done
            2. Post new summary: gh pr comment __PR_NUMBER__ --body "<!-- CODEX_REVIEW_SUMMARY -->

          🟢 **Codex Review Summary**

          <your overall assessment>

          ### Cross-Review of Claude's Findings
          <for each of Claude's comments, state whether you agree/disagree and why — keep it concise>"

          IMPORTANT RULES:
          - Prefix ALL your comments with "🟢 **Codex:**"
          - Do NOT repeat issues Claude already raised correctly
          - Do NOT post praise or filler — if you agree with everything and have nothing to add, just post a brief summary saying so
          - Be specific and actionable in your feedback
          PROMPT_EOF

          # Replace placeholders
          sed -i "s/__PR_NUMBER__/$PR_NUMBER/g" /tmp/codex-review-prompt.txt
          sed -i "s|__REPO__|$REPO|g" /tmp/codex-review-prompt.txt

          # Run Codex (use exec subcommand for non-interactive CI environment)
          codex exec --full-auto "$(cat /tmp/codex-review-prompt.txt)"
