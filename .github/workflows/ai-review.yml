name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  MANTLE_PROMPTS_REPOSITORY: Whisker17/mantle-prompts
  MANTLE_PROMPTS_REF: main
  MANTLE_PROMPTS_DIR: .mantle-prompts
  MANTLE_PROMPTS_PROFILE: profiles/repositories/Whisker17/mantle-agent-scaffold.json

jobs:
  # ─── 🟢 Codex Initial Review ──────────────────────────────────────
  codex-review:
    name: 🟢 Codex Initial Review
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout shared review prompts
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANTLE_PROMPTS_REPOSITORY }}
          ref: ${{ env.MANTLE_PROMPTS_REF }}
          path: ${{ env.MANTLE_PROMPTS_DIR }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Configure Codex gateway
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml << TOML_EOF
          model = "gpt-5.5"
          model_provider = "gateway"
          model_reasoning_effort = "xhigh"
          model_verbosity = "high"
          approval_policy = "never"
          sandbox_mode = "danger-full-access"

          [model_providers.gateway]
          name = "LLM Gateway"
          base_url = "https://${{ vars.CODEX_GATEWAY_HOSTNAME }}"
          env_key = "CODEX_API_KEY"
          wire_api = "responses"
          TOML_EOF

          echo "=== Config file ==="
          cat ~/.codex/config.toml
          echo "=== Codex CLI ==="
          codex --version

      - name: Load and run Codex initial review
        timeout-minutes: 35
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          PROMPT=$(
            python3 .github/scripts/render-shared-prompt.py \
              --prompts-dir "$MANTLE_PROMPTS_DIR" \
              --prompt-path "prompts/adversarial-review/codex-initial-review.md" \
              --profile-path "$MANTLE_PROMPTS_PROFILE" \
              --repo "$REPO" \
              --pr-number "$PR_NUMBER"
          )

          CODEX_FINAL="$RUNNER_TEMP/codex-review-final.md"
          CODEX_LOG="$RUNNER_TEMP/codex-review.log"

          # Run Codex without its internal Linux sandbox; GitHub Actions is the
          # external runner boundary. Keep the full transcript out of Actions logs
          # unless Codex fails, because the transcript can include large diffs.
          if ! codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            --output-last-message "$CODEX_FINAL" \
            "$PROMPT" > "$CODEX_LOG" 2>&1; then
            echo "Codex initial review failed. Last 200 log lines:"
            tail -n 200 "$CODEX_LOG"
            exit 1
          fi

          echo "Codex initial review completed. Final message:"
          cat "$CODEX_FINAL"

  # ─── 🟣 Claude Review + Codex Cross-Review ────────────────────────
  claude-review:
    name: 🟣 Claude Review
    needs: codex-review
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout shared review prompts
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANTLE_PROMPTS_REPOSITORY }}
          ref: ${{ env.MANTLE_PROMPTS_REF }}
          path: ${{ env.MANTLE_PROMPTS_DIR }}

      - name: Load review prompt
        id: prompt
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          PROMPT=$(
            python3 .github/scripts/render-shared-prompt.py \
              --prompts-dir "$MANTLE_PROMPTS_DIR" \
              --prompt-path "prompts/adversarial-review/claude-second-pass-review.md" \
              --profile-path "$MANTLE_PROMPTS_PROFILE" \
              --repo "$REPO" \
              --pr-number "$PR_NUMBER"
          )
          {
            echo "content<<PROMPT_DELIMITER"
            echo "$PROMPT"
            echo "PROMPT_DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: https://${{ vars.LLM_GATEWAY_HOSTNAME }}
        with:
          anthropic_api_key: ${{ secrets.LLM_GATEWAY_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: false
          prompt: ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model claude-opus-4-6-thinking
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment ${{ github.event.pull_request.number }} --body:*),Bash(gh pr comment ${{ github.event.pull_request.number }} --edit-last --body:*),Bash(gh pr comment ${{ github.event.pull_request.number }} --delete-last:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments:*),Bash(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments/*/replies:*),Bash(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments:*)"

  # ─── 🟢 Codex Final Review + Claude Cross-Review ──────────────────
  codex-final-review:
    name: 🟢 Codex Final Review
    needs: claude-review
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Harden the runner (Audit outbound calls)
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout shared review prompts
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANTLE_PROMPTS_REPOSITORY }}
          ref: ${{ env.MANTLE_PROMPTS_REF }}
          path: ${{ env.MANTLE_PROMPTS_DIR }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Configure Codex gateway
        run: |
          mkdir -p ~/.codex
          cat > ~/.codex/config.toml << TOML_EOF
          model = "gpt-5.5"
          model_provider = "gateway"
          model_reasoning_effort = "xhigh"
          model_verbosity = "high"
          approval_policy = "never"
          sandbox_mode = "danger-full-access"

          [model_providers.gateway]
          name = "LLM Gateway"
          base_url = "https://${{ vars.CODEX_GATEWAY_HOSTNAME }}"
          env_key = "CODEX_API_KEY"
          wire_api = "responses"
          TOML_EOF

          echo "=== Config file ==="
          cat ~/.codex/config.toml
          echo "=== Codex CLI ==="
          codex --version

      - name: Load and run Codex final review
        timeout-minutes: 35
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          PROMPT=$(
            python3 .github/scripts/render-shared-prompt.py \
              --prompts-dir "$MANTLE_PROMPTS_DIR" \
              --prompt-path "prompts/adversarial-review/codex-final-review.md" \
              --profile-path "$MANTLE_PROMPTS_PROFILE" \
              --repo "$REPO" \
              --pr-number "$PR_NUMBER"
          )

          CODEX_FINAL="$RUNNER_TEMP/codex-final-review-final.md"
          CODEX_LOG="$RUNNER_TEMP/codex-final-review.log"

          if ! codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            --output-last-message "$CODEX_FINAL" \
            "$PROMPT" > "$CODEX_LOG" 2>&1; then
            echo "Codex final review failed. Last 200 log lines:"
            tail -n 200 "$CODEX_LOG"
            exit 1
          fi

          echo "Codex final review completed. Final message:"
          cat "$CODEX_FINAL"
